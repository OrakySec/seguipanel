services:
  # ──────────────────────────────────────────────────────────────────────────────
  # Aplicação Next.js
  # ──────────────────────────────────────────────────────────────────────────────
  app:
    image: ghcr.io/orakysec/seguipanel:latest
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/smm_app"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: "7d"
      NEXT_PUBLIC_APP_URL: "https://seguifacil.com"
      CRON_SECRET: "${CRON_SECRET}"
      PUSHINPAY_WEBHOOK_SECRET: "${PUSHINPAY_WEBHOOK_SECRET}"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_BUCKET: "smm-app"
      MINIO_USE_SSL: "false"
      REDIS_URL: "redis://redis:6379"
    networks:
      - YkaroNET
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=YkaroNET"
        - "traefik.http.routers.seguifacil.rule=Host(`seguifacil.com`) || Host(`www.seguifacil.com`)"
        - "traefik.http.routers.seguifacil.entrypoints=websecure"
        - "traefik.http.routers.seguifacil.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.seguifacil.loadbalancer.server.port=3000"

  # ──────────────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: smm_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # ──────────────────────────────────────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # ──────────────────────────────────────────────────────────────────────────────
  # MinIO
  # ──────────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
    volumes:
      - minio_data:/data
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  YkaroNET:
    external: true
  internal:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
