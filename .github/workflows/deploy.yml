name: Build & Deploy

on:
  push:
    branches:
      - main
    # Ignora commits feitos pelo próprio CI para evitar loop infinito
    paths-ignore:
      - 'docker-compose.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/seguipanel

jobs:
  build-and-push:
    name: Build e publicar imagem
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      sha_tag: ${{ steps.sha.outputs.tag }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar tag SHA curta
        id: sha
        run: echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Atualizar docker-compose.yml com tag SHA
        run: |
          sed -i "s|image: ghcr.io/orakysec/seguipanel:.*|image: ghcr.io/orakysec/seguipanel:${{ steps.sha.outputs.tag }}|" docker-compose.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git commit -m "ci: update image tag to ${{ steps.sha.outputs.tag }} [skip ci]"
          git push

  deploy:
    name: Redeploy no VPS via SSH
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Forçar atualização do serviço com tag SHA
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          timeout: 120s
          script: |
            docker pull ghcr.io/orakysec/seguipanel:${{ needs.build-and-push.outputs.sha_tag }}
            docker service update \
              --image ghcr.io/orakysec/seguipanel:${{ needs.build-and-push.outputs.sha_tag }} \
              --force \
              seguifacil_app
