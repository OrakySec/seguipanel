name: Fix DB Password (one-time)

on:
  workflow_dispatch:

jobs:
  fix-password:
    name: Corrigir senha do banco via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Executar ALTER USER no banco
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          timeout: 60s
          script: |
            # Encontra o container do postgres do seguifacil e altera a senha
            CONTAINER=$(docker ps --filter "name=seguifacil_postgres" --format "{{.ID}}" | head -1)
            echo "Container encontrado: $CONTAINER"
            docker exec -i "$CONTAINER" psql -U postgres -d smm_app -c "ALTER USER postgres WITH PASSWORD 'Deligar89541300';"
            echo "Senha alterada com sucesso!"
